<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acceso al Sistema</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#667eea,#1a45bb);
    overflow:hidden;
}

body::before{
    content:'';
    position:absolute;
    width:300px;
    height:300px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    top:-100px;
    left:-100px;
}

body::after{
    content:'';
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.08);
    border-radius:50%;
    bottom:-150px;
    right:-150px;
}

.login-card{
    position:relative;
    width:380px;
    padding:40px;
    border-radius:25px;
    backdrop-filter:blur(15px);
    background:rgba(255,255,255,0.15);
    border:1px solid rgba(255,255,255,0.2);
    box-shadow:0 8px 32px rgba(0,0,0,0.2);
    animation:fadeIn 1s ease;
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.logo{
    text-align:center;
    font-size:55px;
    color:white;
    margin-bottom:15px;
}

h2{
    text-align:center;
    color:white;
    margin-bottom:25px;
    font-weight:600;
}

.form-group{
    position:relative;
    margin-bottom:20px;
}

.form-group input{
    width:100%;
    padding:14px 45px;
    border:none;
    outline:none;
    border-radius:12px;
    background:rgba(255,255,255,0.2);
    color:white;
    font-size:15px;
}

.form-group input::placeholder{
    color:rgba(255,255,255,0.8);
}

.form-group i{
    position:absolute;
    left:15px;
    top:50%;
    transform:translateY(-50%);
    color:white;
}

.form-group input:focus{
    background:rgba(255,255,255,0.3);
    box-shadow:0 0 10px rgba(255,255,255,0.3);
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:white;
    color:#034cd4;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-3px);
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.error{
    background:rgba(255,0,0,0.15);
    color:#fff;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    text-align:center;
}

.extra{
    text-align:center;
    margin-top:20px;
    color:white;
    font-size:14px;
}

.extra a{
    color:#fff;
    font-weight:bold;
    text-decoration:none;
}

.extra a:hover{
    text-decoration:underline;
}

</style>
</head>
<body>

<div class="login-card">

    <div class="logo">
        <i class="fas fa-user-shield"></i>
    </div>

    <h2>Bienvenido</h2>

    {% if mensaje %}
        <div class="error">
            {{ mensaje }}
        </div>
    {% endif %}

    <!-- CÓDIGO ACTUALIZADO PARA CONECTAR CON RENDER -->
<form action="https://flask-proyecto-7xl2.onrender.com/login" method="POST">

        <div class="form-group">
            <i class="fas fa-user"></i>
            <input
                type="text"
                id="username"
                name="username"
                placeholder="Ingrese su usuario"
                required>
        </div>

        <div class="form-group">
            <i class="fas fa-lock"></i>
            <input
                type="password"
                id="password"
                name="password"
                placeholder="Ingrese su contraseña"
                required>
        </div>

        <button type="submit">
            <i class="fas fa-sign-in-alt"></i>
            Ingresar al Sistema
        </button>

    </form>


</div>

</body>
</html>
